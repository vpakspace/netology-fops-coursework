---
###############################################################################
# Docker через стандартный ubuntu apt-репо (docker.io).
# Версия не самая свежая, но устанавливается без зависимости от download.docker.com.
###############################################################################
- name: "Install docker.io + compose plugin"
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
      - python3-docker     # для community.docker.docker_container
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: "Enable & start docker"
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: "Add ubuntu user to docker group"
  ansible.builtin.user:
    name: "{{ ansible_user | default('ubuntu') }}"
    groups: docker
    append: true
