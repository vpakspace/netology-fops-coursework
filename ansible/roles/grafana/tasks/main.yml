---
- name: "Ensure grafana provisioning + data dirs (owner uid 472 = grafana inside container)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: '472'
    group: '0'
    mode: '0755'
  loop:
    - "{{ grafana_data_dir }}"
    - "{{ grafana_dashboards_dir }}"
    - "{{ grafana_provisioning_dir }}/datasources"
    - "{{ grafana_provisioning_dir }}/dashboards"

- name: "Deploy datasource provisioning"
  ansible.builtin.template:
    src: datasources.yaml.j2
    dest: "{{ grafana_provisioning_dir }}/datasources/prometheus.yaml"
    owner: '472'
    group: '0'
    mode: '0644'

- name: "Deploy dashboards provider config"
  ansible.builtin.template:
    src: dashboards-provider.yaml.j2
    dest: "{{ grafana_provisioning_dir }}/dashboards/default.yaml"
    owner: '472'
    group: '0'
    mode: '0644'

- name: "Copy dashboards JSON"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ grafana_dashboards_dir }}/{{ item | basename }}"
    owner: '472'
    group: '0'
    mode: '0644'
  with_fileglob:
    - "dashboards/*.json"

- name: "Pull grafana image"
  community.docker.docker_image:
    name: "{{ grafana_image }}"
    source: pull

- name: "Run grafana container"
  community.docker.docker_container:
    name: grafana
    image: "{{ grafana_image }}"
    state: started
    restart_policy: unless-stopped
    user: '472'
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"
    env:
      GF_SECURITY_ADMIN_USER: "{{ grafana_admin_user }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "{{ grafana_dashboards_dir }}/nginx.json"
      # Анонимный read-only доступ — для дипломной защиты
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    published_ports:
      - "0.0.0.0:{{ grafana_port }}:3000"
    volumes:
      - "{{ grafana_data_dir }}:/var/lib/grafana"
      - "{{ grafana_provisioning_dir }}:/etc/grafana/provisioning:ro"

- name: "Wait for Grafana /api/health (max 60s)"
  ansible.builtin.uri:
    url: "http://localhost:{{ grafana_port }}/api/health"
    status_code: 200
  register: grafana_health
  until: grafana_health.status == 200
  retries: 12
  delay: 5
  failed_when: false

- name: "Grafana status"
  ansible.builtin.debug:
    msg: >
      Grafana {{ grafana_health.json.version | default('?') }} —
      database: {{ grafana_health.json.database | default('?') }} ·
      admin / {{ grafana_admin_password }}
