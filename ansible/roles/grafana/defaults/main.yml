---
grafana_image: "grafana/grafana:11.4.0"
grafana_port: 3000
grafana_admin_user: "admin"
grafana_admin_password: "diplom-admin"   # переопределить через --extra-vars при необходимости

# host:port Prometheus для datasource
grafana_prometheus_host: "{{ hostvars['prometheus']['ansible_host'] }}"
grafana_prometheus_port: 9090

# Локальные пути для provisioning и dashboards
grafana_provisioning_dir: /etc/grafana/provisioning
grafana_dashboards_dir: /var/lib/grafana/dashboards
grafana_data_dir: /var/lib/grafana
