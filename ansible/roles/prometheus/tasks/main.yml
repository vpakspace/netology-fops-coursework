---
- name: "Install prometheus"
  ansible.builtin.apt:
    name: prometheus
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: "Deploy prometheus.yml"
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: root
    group: root
    mode: '0644'
    validate: 'promtool check config %s'
  notify: reload prometheus

- name: "Override retention в /etc/default/prometheus (ARGS)"
  ansible.builtin.copy:
    dest: /etc/default/prometheus
    content: |
      # Управляется Ansible. Параметры командной строки prometheus daemon.
      ARGS="--storage.tsdb.retention.time={{ prometheus_retention }} --web.listen-address=0.0.0.0:{{ prometheus_port }}"
    owner: root
    group: root
    mode: '0644'
  notify: reload prometheus

- name: "Enable & start prometheus"
  ansible.builtin.systemd:
    name: prometheus
    state: started
    enabled: true
    daemon_reload: true

- name: "Wait for /-/ready"
  ansible.builtin.uri:
    url: "http://localhost:{{ prometheus_port }}/-/ready"
    status_code: 200
  register: prom_ready
  until: prom_ready.status == 200
  retries: 12
  delay: 3
