---
###############################################################################
# Главный playbook дипломного проекта.
#
# Запуск:
#   cd ansible/
#   ansible-playbook playbooks/site.yml
#
# Точечный запуск по тегам:
#   ansible-playbook playbooks/site.yml --tags common
#
# Поэтапная сборка — раскомментировать роли по мере готовности.
###############################################################################

- name: "Базовая настройка (все хосты)"
  hosts: all
  become: true
  gather_facts: true
  roles:
    - role: common
      tags: [common, always]

